<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .admin-banner {
            background: linear-gradient(135deg, #343a40 0%, #1a1a2e 100%);
            color: var(--white);
            padding: 2rem;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-banner h2 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .admin-banner p {
            opacity: 0.8;
        }

        .revenue-badge {
            background-color: var(--primary);
            color: var(--white);
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .revenue-badge .amount {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .revenue-badge p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.7rem;
            color: var(--gray-600);
            font-weight: 600;
            border-bottom: 2px solid var(--gray-200);
        }

        td {
            padding: 0.7rem;
            border-bottom: 1px solid var(--gray-200);
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .tab {
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 500;
            color: var(--gray-600);
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <div class="nav-dropdown">
            <button class="nav-dots" onclick="toggleMenu()">⋮</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="dashboard.html">🏠 Dashboard</a>
                <a href="admin.html">⚙️ Admin Dashboard</a>
                <a href="profile.html">👤 My Profile</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- ADMIN BANNER -->
        <div class="admin-banner">
            <div>
                <h2>⚙️ Admin Dashboard</h2>
                <p>Monitor and manage the CampusLink platform</p>
            </div>
            <div class="revenue-badge">
                <div class="amount" id="total-revenue">...</div>
                <p>Total Revenue</p>
            </div>
        </div>

        <div id="alert-container"></div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🛍️</div>
                <div class="stat-number" id="total-listings">-</div>
                <div class="stat-label">Total Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💼</div>
                <div class="stat-number" id="total-jobs">-</div>
                <div class="stat-label">Total Jobs</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="card">
            <div class="tabs">
                <div class="tab active" id="tab-btn-users" onclick="switchTab('users')">👥 Users</div>
                <div class="tab" id="tab-btn-listings" onclick="switchTab('listings')">🛍️ Listings</div>
            </div>

            <div id="tab-users" class="tab-content active">
                <div id="users-table">Loading users...</div>
            </div>

            <div id="tab-listings" class="tab-content">
                <div id="listings-table">Loading listings...</div>
            </div>

        </div>

    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function toggleMenu() {
    document.getElementById("dropdown-menu").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    if (!e.target.closest(".nav-dropdown")) {
        document.getElementById("dropdown-menu").classList.remove("open");
    }
});
        requireAuth();

        async function loadAdminDashboard() {
    try {
        const overview = await apiRequest("/admin/overview", "GET", null, true);

        if (document.getElementById("total-revenue")) 
            document.getElementById("total-revenue").textContent = formatCurrency(overview.total_revenue);
        if (document.getElementById("total-users")) 
            document.getElementById("total-users").textContent = overview.total_users;
        if (document.getElementById("total-listings")) 
            document.getElementById("total-listings").textContent = overview.total_listings;
        if (document.getElementById("total-jobs")) 
            document.getElementById("total-jobs").textContent = overview.total_jobs;

        loadUsers();
    } catch (error) {
        document.getElementById("alert-container").innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    }
}

        async function loadUsers() {
            try {
                const users = await apiRequest("/admin/users", "GET", null, true);
                document.getElementById("users-table").innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Matric No</th>
                                <th>Role</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.full_name}</td>
                                    <td>${u.email}</td>
                                    <td>${u.matric_number}</td>
                                    <td><span class="badge badge-primary">${u.role}</span></td>
                                    <td style="display:flex; gap:0.5rem">
                                        ${u.role === "seller" ? `
                                            <button class="btn btn-success" style="padding: 0.3rem 0.8rem; font-size: 0.8rem" onclick="verifySeller(${u.id})">Verify</button>
                                        ` : ""}
                                        <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.8rem" onclick="deleteUser(${u.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error("Users load error:", error);
                document.getElementById("users-table").innerHTML = `<p style="color:red">Error loading users: ${error.message}</p>`;
            }
        }

        async function loadListings() {
            try {
                const listings = await apiRequest("/admin/listings", "GET", null, true);
                document.getElementById("listings-table").innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Owner</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${listings.map(l => `
                                <tr>
                                    <td>${l.id}</td>
                                    <td>${l.title}</td>
                                    <td><span class="badge badge-primary">${l.category}</span></td>
                                    <td>${formatCurrency(l.price)}</td>
                                    <td>User #${l.owner_id}</td>
                                    <td>
                                        <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.8rem" onclick="deleteListing(${l.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById("listings-table").innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }


        async function verifySeller(userId) {
            if (!confirm("Verify this seller?")) return;
            try {
                await apiRequest(`/admin/users/${userId}/verify-seller`, "PUT", null, true);
                alert("Seller verified successfully!");
                loadUsers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteUser(userId) {
            if (!confirm("Are you sure you want to delete this user?")) return;
            try {
                await apiRequest(`/admin/users/${userId}`, "DELETE", null, true);
                alert("User deleted successfully!");
                loadUsers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteListing(listingId) {
            if (!confirm("Are you sure you want to delete this listing?")) return;
            try {
                await apiRequest(`/admin/listings/${listingId}`, "DELETE", null, true);
                alert("Listing deleted successfully!");
                loadListings();
            } catch (error) {
                alert(error.message);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));

            document.getElementById(`tab-btn-${tab}`).classList.add("active");
            document.getElementById(`tab-${tab}`).classList.add("active");

            if (tab === "listings") loadListings();
        }

        setTimeout(() => {
            loadAdminDashboard();
        }, 500);
    </script>
</body>
</html>
