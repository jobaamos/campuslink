<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo a {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .auth-card h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .auth-card .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">🔗 CampusLink</a>
            </div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your CampusLink account</p>

            <div id="alert-container"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative">
                    <input type="password" id="password" placeholder="Enter your password" style="padding-right: 3rem">
                    <button type="button" onclick="togglePassword('password', 'eye1')" 
                        style="position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem">
                        <span id="eye1">👁️</span>
                    </button>
                </div>
            </div>

            <button class="btn btn-primary" onclick="login()">Login</button>

            <div class="auth-footer">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
            <div class="auth-footer" style="margin-top: 0.5rem">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(fieldId, eyeId) {
            const field = document.getElementById(fieldId);
            const eye = document.getElementById(eyeId);
            if (field.type === "password") {
                field.type = "text";
                eye.textContent = "🙈";
            } else {
                field.type = "password";
                eye.textContent = "👁️";
            }
        }
        redirectIfLoggedIn();

        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                showAlert("Please fill in all fields", "danger");
                return;
            }

            try {
                const data = await apiRequest("/auth/login", "POST", { email, password });
                setToken(data.access_token);

                // Fetch user profile and save
                const user = await apiRequest("/users/me", "GET", null, true);
                setUser(user);

                window.location.href = "dashboard.html";
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }
    </script>
</body>
</html>
