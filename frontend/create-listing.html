<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Listing - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <div class="nav-dropdown">
            <button class="nav-dots" onclick="toggleMenu()">⋮</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="dashboard.html">🏠 Dashboard</a>
                <a href="listings.html">🛍️ Listings</a>
                <a href="jobs.html">💼 Jobs</a>
                <a href="messages.html">💬 Messages</a>
                <a href="notifications.html">🔔 Notifications <span class="notif-count"></span></a>
                <a href="profile.html">👤 My Profile</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Create a Listing</h1>
            <p>List a product or service for the campus community</p>
        </div>

        <div class="form-container">
            <div class="card">
                <div id="alert-container"></div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="e.g. Python Tutoring, Laptop for Sale">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4" placeholder="Describe your product or service..."></textarea>
                </div>
                <div class="form-group">
                    <label>Price (₦)</label>
                    <input type="number" id="price" placeholder="Enter price in Naira">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="">Select category</option>
                        <option value="product">Product</option>
                        <option value="service">Service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="listing_type">
                        <option value="">Select type</option>
                        <option value="tutoring">Tutoring</option>
                        <option value="design">Design</option>
                        <option value="food">Food</option>
                        <option value="electronics">Electronics</option>
                        <option value="writing">Writing</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="createListing()">Create Listing</button>
                <a href="listings.html" class="btn btn-outline" style="margin-left: 1rem;">Cancel</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function toggleMenu() {
    document.getElementById("dropdown-menu").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    if (!e.target.closest(".nav-dropdown")) {
        document.getElementById("dropdown-menu").classList.remove("open");
    }
});
        requireAuth();

        async function checkSellerRole() {
            const user = await apiRequest("/users/me", "GET", null, true);
            if (user.role === "user") {
                const upgrade = confirm("You need to be a seller to create listings. Would you like to upgrade your account to seller?");
                if (upgrade) {
                    await apiRequest("/users/me/become-seller", "PUT", null, true);
                    showAlert("You are now a seller! You can create listings.", "success");
                } else {
                    window.location.href = "dashboard.html";
                }
            }
        }

        async function createListing() {
            const title = document.getElementById("title").value.trim();
            const description = document.getElementById("description").value.trim();
            const price = document.getElementById("price").value.trim();
            const category = document.getElementById("category").value;
            const listing_type = document.getElementById("listing_type").value;

            if (!title || !description || !price || !category || !listing_type) {
                showAlert("Please fill in all fields", "danger");
                return;
            }

            try {
                await apiRequest("/listings/", "POST", {
                    title,
                    description,
                    price: parseFloat(price),
                    category,
                    listing_type
                }, true);
                showAlert("Listing created successfully! Redirecting...", "success");
                setTimeout(() => { window.location.href = "listings.html"; }, 2000);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        checkSellerRole();
    </script>
</body>
</html>
