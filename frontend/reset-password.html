<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo a {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .auth-card h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .auth-card .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">🔗 CampusLink</a>
            </div>
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your new password below</p>

            <div id="alert-container"></div>

            <div id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Enter your new password">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your new password">
                </div>
                <button class="btn btn-primary" onclick="resetPassword()">Reset Password</button>
            </div>

            <div id="success-state" style="display: none; text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 1rem">✅</div>
                <p style="color: var(--gray-600); margin-bottom: 1.5rem">Your password has been reset successfully!</p>
                <a href="login.html" class="btn btn-primary">Go to Login</a>
            </div>

            <div class="auth-footer">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            window.location.href = "forgot-password.html";
        }

        async function resetPassword() {
            const newPassword = document.getElementById("new-password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();

            if (!newPassword || !confirmPassword) {
                showAlert("Please fill in all fields", "danger");
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert("Passwords do not match", "danger");
                return;
            }

            if (newPassword.length < 6) {
                showAlert("Password must be at least 6 characters", "danger");
                return;
            }

            try {
                await apiRequest(`/auth/reset-password?token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(newPassword)}`, "POST");
                document.getElementById("reset-form").style.display = "none";
                document.getElementById("success-state").style.display = "block";
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }
    </script>
</body>
</html>
