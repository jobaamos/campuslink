<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .notification-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1rem;
            border-bottom: 1px solid var(--gray-200);
            gap: 1rem;
            transition: background 0.2s;
        }

        .notification-item:hover {
            background-color: var(--gray-100);
        }

        .notification-item.unread {
            background-color: var(--primary-light);
            border-left: 3px solid var(--primary);
        }

        .notification-icon {
            font-size: 1.5rem;
            min-width: 40px;
            text-align: center;
        }

        .notification-content {
            flex-grow: 1;
        }

        .notification-content p {
            font-size: 0.95rem;
            color: var(--gray-800);
            margin-bottom: 0.3rem;
        }

        .notification-content small {
            color: var(--gray-600);
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--gray-600);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <div class="nav-dropdown">
            <button class="nav-dots" onclick="toggleMenu()">⋮</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="dashboard.html">🏠 Dashboard</a>
                <a href="listings.html">🛍️ Listings</a>
                <a href="jobs.html">💼 Jobs</a>
                <a href="messages.html">💬 Messages</a>
                <a href="notifications.html">🔔 Notifications <span class="notif-count"></span></a>
                <a href="profile.html">👤 My Profile</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center">
            <div>
                <h1>Notifications</h1>
                <p>Stay updated on your activity</p>
            </div>
            <button class="btn btn-outline" onclick="markAllRead()">Mark all as read</button>
        </div>

        <div id="alert-container"></div>

        <div class="card" id="notifications-container">
            <p style="color: var(--gray-600)">Loading notifications...</p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function toggleMenu() {
    document.getElementById("dropdown-menu").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    if (!e.target.closest(".nav-dropdown")) {
        document.getElementById("dropdown-menu").classList.remove("open");
    }
});
        requireAuth();

        async function loadNotifications() {
            try {
                const notifications = await apiRequest("/notifications/", "GET", null, true);
                const container = document.getElementById("notifications-container");

                if (notifications.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🔔</div>
                            <h3>No notifications yet</h3>
                            <p>You'll be notified when someone applies for your job, pays for your listing, or leaves a review.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = notifications.map(n => `
                    <div class="notification-item ${!n.is_read ? "unread" : ""}" onclick="markRead(${n.id}, this)">
                        <div class="notification-icon">${getIcon(n.notification_type)}</div>
                        <div class="notification-content">
                            <p>${n.message}</p>
                            <small>${formatDate(n.created_at)}</small>
                        </div>
                        ${!n.is_read ? '<span class="badge badge-primary">New</span>' : ""}
                    </div>
                `).join("");

            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        function getIcon(type) {
            const icons = {
                job_application: "💼",
                payment: "💳",
                review: "⭐",
                message: "💬"
            };
            return icons[type] || "🔔";
        }

        async function markRead(id, element) {
            try {
                await apiRequest(`/notifications/${id}/read`, "PUT", null, true);
                element.classList.remove("unread");
                const badge = element.querySelector(".badge");
                if (badge) badge.remove();
                loadUnreadCount();
            } catch (error) {
                console.error(error);
            }
        }

        async function markAllRead() {
            try {
                await apiRequest("/notifications/mark-all-read", "PUT", null, true);
                showAlert("All notifications marked as read!", "success");
                loadNotifications();
                loadUnreadCount();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function loadUnreadCount() {
            try {
                const data = await apiRequest("/notifications/unread-count", "GET", null, true);
                const countEl = document.getElementById("notif-count");
                if (data.count > 0) {
                    countEl.textContent = `(${data.count})`;
                } else {
                    countEl.textContent = "";
                }
            } catch (error) {
                console.error(error);
            }
        }

        loadNotifications();
        loadUnreadCount();
    </script>
</body>
</html>
