<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .messages-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            height: 70vh;
        }

        .inbox-list {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-y: auto;
        }

        .inbox-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            font-size: 1rem;
        }

        .inbox-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            cursor: pointer;
            transition: background 0.2s;
        }

        .inbox-item:hover {
            background-color: var(--primary-light);
        }

        .inbox-item.active {
            background-color: var(--primary-light);
            border-left: 3px solid var(--primary);
        }

        .inbox-item h4 {
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .inbox-item p {
            font-size: 0.85rem;
            color: var(--gray-600);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inbox-item .unread {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            float: right;
            margin-top: 5px;
        }

        .chat-area {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .message-bubble.sent {
            background-color: var(--primary);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message-bubble.received {
            background-color: var(--gray-100);
            color: var(--gray-800);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message-bubble .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .chat-input {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 1rem;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 0.7rem 1rem;
            border: 1px solid var(--gray-400);
            border-radius: var(--radius);
            outline: none;
        }

        .chat-input input:focus {
            border-color: var(--primary);
        }

        .empty-chat {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--gray-600);
            gap: 1rem;
        }

        .new-message-form {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .new-message-form .form-group {
            margin-bottom: 0;
            flex: 1;
        }

        @media (max-width: 768px) {
            .messages-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="listings.html">Listings</a>
            <a href="jobs.html">Jobs</a>
            <a href="messages.html">Messages</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Messages</h1>
            <p>Your inbox and conversations</p>
        </div>

        <div id="alert-container"></div>

        <!-- NEW MESSAGE -->
        <div class="card" style="margin-bottom: 1.5rem">
            <h3 style="margin-bottom: 1rem">Send a New Message</h3>
            <div style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap">
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px">
                    <label>Recipient User ID</label>
                    <input type="number" id="receiver-id" placeholder="Enter user ID">
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 3; min-width: 200px">
                    <label>Message</label>
                    <input type="text" id="new-message" placeholder="Type your message...">
                </div>
                <button class="btn btn-primary" onclick="sendNewMessage()">Send</button>
            </div>
        </div>

        <div class="messages-layout">
            <!-- INBOX -->
            <div class="inbox-list">
                <div class="inbox-header">Inbox</div>
                <div id="inbox-items">
                    <p style="padding: 1rem; color: var(--gray-600)">Loading...</p>
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-area" id="chat-area">
                <div class="empty-chat">
                    <div style="font-size: 3rem">💬</div>
                    <p>Select a conversation to view messages</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        requireAuth();

        let currentUserId = null;
        let currentThreadUserId = null;

        async function loadInbox() {
            try {
                const user = await apiRequest("/users/me", "GET", null, true);
                currentUserId = user.id;

                const inbox = await apiRequest("/messages/inbox", "GET", null, true);
                const inboxItems = document.getElementById("inbox-items");

                if (inbox.length === 0) {
                    inboxItems.innerHTML = `<p style="padding: 1rem; color: var(--gray-600)">No messages yet.</p>`;
                    return;
                }

                // Group by sender
                const senders = {};
                inbox.forEach(msg => {
                    if (!senders[msg.sender_id]) {
                        senders[msg.sender_id] = msg;
                    }
                });

                inboxItems.innerHTML = Object.values(senders).map(msg => `
                    <div class="inbox-item ${!msg.is_read ? "unread-item" : ""}" onclick="loadThread(${msg.sender_id})">
                        ${!msg.is_read ? '<div class="unread"></div>' : ""}
                        <h4>User #${msg.sender_id}</h4>
                        <p>${msg.content}</p>
                    </div>
                `).join("");

                // Check if redirected from listing
                const params = new URLSearchParams(window.location.search);
                const userId = params.get("user_id");
                if (userId) {
                    loadThread(parseInt(userId));
                }

            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function loadThread(userId) {
            currentThreadUserId = userId;

            // Mark active
            document.querySelectorAll(".inbox-item").forEach(item => item.classList.remove("active"));

            try {
                const messages = await apiRequest(`/messages/thread/${userId}`, "GET", null, true);

                document.getElementById("chat-area").innerHTML = `
                    <div class="chat-header">Conversation with User #${userId}</div>
                    <div class="chat-messages" id="chat-messages">
                        ${messages.length === 0 ? '<p style="color: var(--gray-600)">No messages yet. Say hello!</p>' :
                            messages.map(msg => `
                                <div class="message-bubble ${msg.sender_id === currentUserId ? "sent" : "received"}">
                                    <p>${msg.content}</p>
                                    <div class="message-time">${formatDate(msg.created_at)}</div>
                                </div>
                            `).join("")
                        }
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chat-message-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                `;

                // Scroll to bottom
                const chatMessages = document.getElementById("chat-messages");
                if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;

            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function sendMessage() {
            const content = document.getElementById("chat-message-input").value.trim();
            if (!content) return;

            try {
                await apiRequest("/messages/", "POST", {
                    receiver_id: currentThreadUserId,
                    content
                }, true);
                document.getElementById("chat-message-input").value = "";
                loadThread(currentThreadUserId);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function sendNewMessage() {
            const receiver_id = parseInt(document.getElementById("receiver-id").value);
            const content = document.getElementById("new-message").value.trim();

            if (!receiver_id || !content) {
                showAlert("Please fill in both fields", "danger");
                return;
            }

            try {
                await apiRequest("/messages/", "POST", { receiver_id, content }, true);
                showAlert("Message sent!", "success");
                document.getElementById("new-message").value = "";
                loadInbox();
                loadThread(receiver_id);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }

        loadInbox();
    </script>
</body>
</html>
