<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .messages-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            height: 70vh;
        }

        .inbox-list {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-y: auto;
        }

        .inbox-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            font-size: 1rem;
        }

        .inbox-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            cursor: pointer;
            transition: background 0.2s;
        }

        .inbox-item:hover {
            background-color: var(--primary-light);
        }

        .inbox-item.active {
            background-color: var(--primary-light);
            border-left: 3px solid var(--primary);
        }

        .inbox-item h4 {
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .inbox-item p {
            font-size: 0.85rem;
            color: var(--gray-600);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inbox-item .unread {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            float: right;
            margin-top: 5px;
        }

        .chat-area {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .message-bubble.sent {
            background-color: var(--primary);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message-bubble.received {
            background-color: var(--gray-100);
            color: var(--gray-800);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message-bubble .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .chat-input {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 1rem;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 0.7rem 1rem;
            border: 1px solid var(--gray-400);
            border-radius: var(--radius);
            outline: none;
        }

        .chat-input input:focus {
            border-color: var(--primary);
        }

        .empty-chat {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--gray-600);
            gap: 1rem;
        }

        .new-message-form {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .new-message-form .form-group {
            margin-bottom: 0;
            flex: 1;
        }

        @media (max-width: 768px) {
            .messages-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo"><img src="assets/campuslink_logo.png" alt="CampusLink"> CampusLink</div>
        <div class="nav-dropdown">
            <button class="nav-dots" onclick="toggleMenu()">⋮</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="dashboard.html">🏠 Dashboard</a>
                <a href="listings.html">🛍️ Listings</a>
                <a href="jobs.html">💼 Jobs</a>
                <a href="messages.html">💬 Messages</a>
                <a href="notifications.html">🔔 Notifications <span class="notif-count"></span></a>
                <a href="profile.html">👤 My Profile</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Messages</h1>
            <p>Your inbox and conversations</p>
        </div>

        <div id="alert-container"></div>

        <!-- NEW MESSAGE -->
<div class="card" style="margin-bottom: 1.5rem">
    <h3 style="margin-bottom: 1rem">Send a New Message</h3>
    <div style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap">
        <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px; position: relative">
            <label>Search User by Name</label>
            <input type="text" id="user-search" placeholder="Type a name..." oninput="searchUsers()" autocomplete="off">
            <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--gray-400); border-radius: var(--radius); z-index: 100; display: none; max-height: 200px; overflow-y: auto; box-shadow: var(--shadow)"></div>
        </div>
        <div class="form-group" style="margin-bottom: 0; flex: 3; min-width: 200px">
            <label>Message</label>
            <input type="text" id="new-message" placeholder="Type your message...">
        </div>
        <button class="btn btn-primary" onclick="sendNewMessage()">Send</button>
    </div>
    <div id="selected-user" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--primary); display: none">
        ✅ Sending to: <strong id="selected-user-name"></strong>
    </div>
</div>

        <div class="messages-layout">
            <!-- INBOX -->
            <div class="inbox-list">
                <div class="inbox-header">Inbox</div>
                <div id="inbox-items">
                    <p style="padding: 1rem; color: var(--gray-600)">Loading...</p>
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-area" id="chat-area">
                <div class="empty-chat">
                    <div style="font-size: 3rem">💬</div>
                    <p>Select a conversation to view messages</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function toggleMenu() {
    document.getElementById("dropdown-menu").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    if (!e.target.closest(".nav-dropdown")) {
        document.getElementById("dropdown-menu").classList.remove("open");
    }
});
        requireAuth();

let currentUserId = null;
let currentThreadUserId = null;
let selectedReceiverId = null;

async function loadInbox() {
    try {
        const user = await apiRequest("/users/me", "GET", null, true);
        currentUserId = user.id;

        const conversations = await apiRequest("/messages/conversations", "GET", null, true);
        const inboxItems = document.getElementById("inbox-items");

        if (conversations.length === 0) {
            inboxItems.innerHTML = `<p style="padding: 1rem; color: var(--gray-600)">No messages yet.</p>`;
            return;
        }

        inboxItems.innerHTML = conversations.map(conv => `
            <div class="inbox-item" onclick="loadThread(${conv.partner_id})">
                ${!conv.is_read && conv.partner_id !== currentUserId ? '<div class="unread"></div>' : ""}
                <h4>${conv.partner_name}</h4>
                <p>${conv.last_message}</p>
            </div>
        `).join("");

        const params = new URLSearchParams(window.location.search);
        const userId = params.get("user_id");
        if (userId) {
            loadThread(parseInt(userId));
        }

    } catch (error) {
        showAlert(error.message, "danger");
    }
}

async function searchUsers() {
    const query = document.getElementById("user-search").value.trim();
    const resultsDiv = document.getElementById("search-results");

    if (query.length < 2) {
        resultsDiv.style.display = "none";
        return;
    }

    try {
        const users = await apiRequest(`/users/search?q=${encodeURIComponent(query)}`, "GET", null, true);
        
        if (users.length === 0) {
            resultsDiv.innerHTML = `<div style="padding: 0.8rem; color: var(--gray-600); font-size: 0.9rem">No users found</div>`;
        } else {
            resultsDiv.innerHTML = users.map(u => `
                <div onclick="selectUser(${u.id}, '${u.full_name}')" 
                    style="padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid var(--gray-200); font-size: 0.9rem"
                    onmouseover="this.style.background='var(--primary-light)'" 
                    onmouseout="this.style.background='white'">
                    <strong>${u.full_name}</strong>
                    <span style="color: var(--gray-600); font-size: 0.8rem"> — ${u.role.replace("_", " ")}</span>
                </div>
            `).join("");
        }
        resultsDiv.style.display = "block";
    } catch (error) {
        console.error(error);
    }
}

function selectUser(id, name) {
    selectedReceiverId = id;
    document.getElementById("user-search").value = name;
    document.getElementById("search-results").style.display = "none";
    document.getElementById("selected-user").style.display = "block";
    document.getElementById("selected-user-name").textContent = name;
}
async function getUserName(userId) {
    try {
        const user = await apiRequest(`/users/${userId}/profile`, "GET", null, true);
        return user.full_name;
    } catch {
        return `User #${userId}`;
    }
}
async function loadThread(userId) {
    currentThreadUserId = userId;

    document.querySelectorAll(".inbox-item").forEach(item => item.classList.remove("active"));

    try {
        const messages = await apiRequest(`/messages/thread/${userId}`, "GET", null, true);
        const userName = await getUserName(userId);

        document.getElementById("chat-area").innerHTML = `
        <div class="chat-header">Conversation with ${userName}</div>
            <div class="chat-messages" id="chat-messages">
                ${messages.length === 0 ? '<p style="color: var(--gray-600)">No messages yet. Say hello!</p>' :
                    messages.map(msg => `
                        <div class="message-bubble ${msg.sender_id === currentUserId ? "sent" : "received"}">
                            <p>${msg.content}</p>
                            <div class="message-time">${formatDate(msg.created_at)}</div>
                        </div>
                    `).join("")
                }
            </div>
            <div class="chat-input">
                <input type="text" id="chat-message-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        `;

        const chatMessages = document.getElementById("chat-messages");
        if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;

    } catch (error) {
        showAlert(error.message, "danger");
    }
}

async function sendMessage() {
    const content = document.getElementById("chat-message-input").value.trim();
    if (!content) return;

    try {
        await apiRequest("/messages/", "POST", {
            receiver_id: currentThreadUserId,
            content
        }, true);
        document.getElementById("chat-message-input").value = "";
        await loadThread(currentThreadUserId);
    } catch (error) {
        console.error("Send message error:", error);
        showAlert(typeof error.message === 'string' ? error.message : "Failed to send message", "danger");
    }
}

async function sendNewMessage() {
    if (!selectedReceiverId) {
        showAlert("Please search and select a user first", "danger");
        return;
    }
    const content = document.getElementById("new-message").value.trim();
    if (!content) {
        showAlert("Please type a message", "danger");
        return;
    }

    try {
        const receiverId = selectedReceiverId;
        await apiRequest("/messages/", "POST", { receiver_id: receiverId, content }, true);
        showAlert("Message sent!", "success");
        document.getElementById("new-message").value = "";
        document.getElementById("user-search").value = "";
        document.getElementById("selected-user").style.display = "none";
        selectedReceiverId = null;
        loadInbox();
        loadThread(receiverId);
    } catch (error) {
        showAlert(typeof error.message === 'string' ? error.message : "Failed to send message", "danger");
    }
}

function handleEnter(event) {
    if (event.key === "Enter") sendMessage();
}

// Close search results when clicking outside
document.addEventListener("click", function(e) {
    if (!e.target.closest("#user-search") && !e.target.closest("#search-results")) {
        document.getElementById("search-results").style.display = "none";
    }
});

loadInbox();
    </script>
</body>
</html>
