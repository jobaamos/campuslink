<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo a {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .auth-card h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .auth-card .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">🔗 CampusLink</a>
            </div>
            <h2>Create an Account</h2>
            <p class="subtitle">Join the campus marketplace today</p>

            <div id="alert-container"></div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="full_name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Matric Number</label>
                <input type="text" id="matric_number" placeholder="Enter your matric number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <button class="btn btn-primary" onclick="register()">Create Account</button>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        redirectIfLoggedIn();

        async function register() {
            const full_name = document.getElementById("full_name").value.trim();
            const email = document.getElementById("email").value.trim();
            const matric_number = document.getElementById("matric_number").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!full_name || !email || !matric_number || !password) {
                showAlert("Please fill in all fields", "danger");
                return;
            }

            try {
                await apiRequest("/auth/register", "POST", {
                    full_name, email, matric_number, password
                });
                showAlert("Account created successfully! Redirecting to login...", "success");
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }
    </script>
</body>
</html>
