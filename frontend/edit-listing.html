<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Listing - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo"><img src="assets/campuslink_logo.png" alt="CampusLink"> CampusLink</div>
        <div class="nav-dropdown">
            <button class="nav-dots" onclick="toggleMenu()">⋮</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <a href="dashboard.html">🏠 Dashboard</a>
                <a href="listings.html">🛍️ Listings</a>
                <a href="jobs.html">💼 Jobs</a>
                <a href="messages.html">💬 Messages</a>
                <a href="notifications.html">🔔 Notifications <span class="notif-count"></span></a>
                <a href="profile.html">👤 My Profile</a>
                <div class="dropdown-divider"></div>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Edit Listing</h1>
            <p>Update your listing details</p>
        </div>

        <div class="form-container">
            <div class="card">
                <div id="alert-container"></div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Listing title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4" placeholder="Describe your product or service..."></textarea>
                </div>
                <div class="form-group">
                    <label>Price (₦)</label>
                    <input type="number" id="price" placeholder="Enter price in Naira">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="">Select category</option>
                        <option value="product">Product</option>
                        <option value="service">Service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="listing_type">
                        <option value="">Select type</option>
                        <option value="tutoring">Tutoring</option>
                        <option value="design">Design</option>
                        <option value="food">Food</option>
                        <option value="electronics">Electronics</option>
                        <option value="writing">Writing</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Listing Image (Optional)</label>
                    <div id="current-image-container" style="display:none; margin-bottom: 0.8rem">
                        <img id="current-image" src="" alt="Current listing image" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px;">
                        <small style="color: var(--gray-600)">Current image — upload a new one to replace it</small>
                    </div>
                    <input type="file" id="listing-image" accept="image/jpeg,image/png,image/webp" style="padding: 0.5rem;">
                    <small style="color: var(--gray-600)">Max 5MB. JPEG, PNG or WebP only.</small>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="is_available">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="updateListing()">Save Changes</button>
                <a href="my-listings.html" class="btn btn-outline" style="margin-left: 1rem">Cancel</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function toggleMenu() {
    document.getElementById("dropdown-menu").classList.toggle("open");
}

document.addEventListener("click", function(e) {
    if (!e.target.closest(".nav-dropdown")) {
        document.getElementById("dropdown-menu").classList.remove("open");
    }
});
        requireAuth();

        const params = new URLSearchParams(window.location.search);
        const listingId = params.get("id");

        if (!listingId) {
            window.location.href = "my-listings.html";
        }

        async function loadListing() {
            try {
                const listing = await apiRequest(`/listings/${listingId}`, "GET");

                document.getElementById("title").value = listing.title;
                document.getElementById("description").value = listing.description;
                document.getElementById("price").value = listing.price;
                document.getElementById("category").value = listing.category;
                document.getElementById("listing_type").value = listing.listing_type;
                document.getElementById("is_available").value = listing.is_available.toString();

                // Show current image if exists
                if (listing.image_url) {
                    document.getElementById("current-image-container").style.display = "block";
                    document.getElementById("current-image").src = listing.image_url;
                }

            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function updateListing() {
            const title = document.getElementById("title").value.trim();
            const description = document.getElementById("description").value.trim();
            const price = document.getElementById("price").value.trim();
            const category = document.getElementById("category").value;
            const listing_type = document.getElementById("listing_type").value;
            const is_available = document.getElementById("is_available").value === "true";
            const imageFile = document.getElementById("listing-image").files[0];

            if (!title || !description || !price || !category || !listing_type) {
                showAlert("Please fill in all required fields", "danger");
                return;
            }

            try {
                let image_url = undefined;

                // Upload new image if provided
                if (imageFile) {
                    showAlert("Uploading image...", "success");
                    const formData = new FormData();
                    formData.append("file", imageFile);

                    const response = await fetch(`${API_URL}/listings/upload-image`, {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${getToken()}` },
                        body: formData
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Image upload failed");
                    }

                    const data = await response.json();
                    image_url = data.image_url;
                }

                await apiRequest(`/listings/${listingId}`, "PUT", {
                    title,
                    description,
                    price: parseFloat(price),
                    category,
                    listing_type,
                    is_available,
                    ...(image_url && { image_url })
                }, true);

                showAlert("Listing updated successfully! Redirecting...", "success");
                setTimeout(() => { window.location.href = "my-listings.html"; }, 2000);
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        loadListing();
    </script>
</body>
</html>
