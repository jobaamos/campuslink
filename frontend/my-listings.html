<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .listing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--gray-200);
        }

        .listing-row:last-child {
            border-bottom: none;
        }

        .listing-info h4 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .listing-info p {
            font-size: 0.85rem;
            color: var(--gray-600);
        }

        .listing-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--gray-600);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="listings.html">Listings</a>
            <a href="jobs.html">Jobs</a>
            <a href="messages.html">Messages</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center">
            <div>
                <h1>My Listings</h1>
                <p>Manage all your products and services</p>
            </div>
            <a href="create-listing.html" class="btn btn-primary">+ New Listing</a>
        </div>

        <div id="alert-container"></div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="total-listings">-</div>
                <div class="stat-label">Total Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="active-listings">-</div>
                <div class="stat-label">Active Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="inactive-listings">-</div>
                <div class="stat-label">Inactive Listings</div>
            </div>
        </div>

        <!-- LISTINGS -->
        <div class="card">
            <div id="listings-container">
                <p style="color: var(--gray-600)">Loading listings...</p>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        requireAuth();

        let myListings = [];

        async function loadMyListings() {
            try {
                const user = await apiRequest("/users/me", "GET", null, true);
                const allListings = await apiRequest("/listings/", "GET");
                myListings = allListings.filter(l => l.owner_id === user.id);

                // Stats
                const active = myListings.filter(l => l.is_available).length;
                const inactive = myListings.filter(l => !l.is_available).length;
                document.getElementById("total-listings").textContent = myListings.length;
                document.getElementById("active-listings").textContent = active;
                document.getElementById("inactive-listings").textContent = inactive;

                renderListings();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        function renderListings() {
            const container = document.getElementById("listings-container");

            if (myListings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🛍️</div>
                        <h3>No listings yet</h3>
                        <p>Create your first listing to start selling!</p>
                        <a href="create-listing.html" class="btn btn-primary" style="margin-top: 1rem">Create Listing</a>
                    </div>`;
                return;
            }

            container.innerHTML = myListings.map(l => `
                <div class="listing-row">
                    <div class="listing-info">
                        <h4>${l.title}</h4>
                        <p>${formatCurrency(l.price)} · ${l.category} · ${l.listing_type}</p>
                        <p>Posted on ${formatDate(l.created_at)}</p>
                    </div>
                    <div class="listing-actions">
                        <span class="badge ${l.is_available ? "badge-success" : "badge-warning"}">
                            ${l.is_available ? "Active" : "Inactive"}
                        </span>
                        <button class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.8rem" 
                            onclick="toggleListing(${l.id}, ${l.is_available})">
                            ${l.is_available ? "Deactivate" : "Activate"}
                        </button>
                        <a href="edit-listing.html?id=${l.id}" class="btn btn-primary" style="padding: 0.3rem 0.8rem; font-size: 0.8rem">
                            Edit
                        </a>
                        <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.8rem" 
                            onclick="deleteListing(${l.id})">
                            Delete
                        </button>
                    </div>
                </div>
            `).join("");
        }

        async function toggleListing(listingId, currentStatus) {
            try {
                await apiRequest(`/listings/${listingId}`, "PUT", {
                    is_available: !currentStatus
                }, true);
                showAlert(`Listing ${currentStatus ? "deactivated" : "activated"} successfully!`, "success");
                loadMyListings();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        async function deleteListing(listingId) {
            if (!confirm("Are you sure you want to delete this listing?")) return;
            try {
                await apiRequest(`/listings/${listingId}`, "DELETE", null, true);
                showAlert("Listing deleted successfully!", "success");
                loadMyListings();
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }

        loadMyListings();
    </script>
</body>
</html>
