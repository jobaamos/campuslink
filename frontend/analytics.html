<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .earnings-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 2rem;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            text-align: center;
        }

        .earnings-banner h2 {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .earnings-banner .amount {
            font-size: 3rem;
            font-weight: 700;
        }

        .earnings-banner p {
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🔗 CampusLink</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="listings.html">Listings</a>
            <a href="jobs.html">Jobs</a>
            <a href="messages.html">Messages</a>
            <a href="notifications.html">🔔 <span class="notif-count"></span></a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Seller Analytics</h1>
            <p>Track your performance on CampusLink</p>
        </div>

        <div id="alert-container"></div>

        <!-- EARNINGS BANNER -->
        <div class="earnings-banner">
            <h2>Total Earnings</h2>
            <div class="amount" id="total-earnings">Loading...</div>
            <p id="payments-count">Loading payments...</p>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🛍️</div>
                <div class="stat-number" id="total-listings">-</div>
                <div class="stat-label">Total Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="active-listings">-</div>
                <div class="stat-label">Active Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-number" id="total-reviews">-</div>
                <div class="stat-label">Total Reviews</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-number" id="avg-rating">-</div>
                <div class="stat-label">Average Rating</div>
            </div>
        </div>

        <!-- RECENT PAYMENTS -->

    </div>

    <script src="assets/js/main.js"></script>
    <script>
        requireAuth();

        async function loadAnalytics() {
    try {
        const analytics = await apiRequest("/analytics/dashboard", "GET", null, true);

        // Stats
        document.getElementById("total-listings").textContent = analytics.total_listings;
        document.getElementById("active-listings").textContent = analytics.active_listings;
        document.getElementById("total-reviews").textContent = analytics.total_reviews;
        document.getElementById("avg-rating").textContent = analytics.average_rating + " ⭐";

    } catch (error) {
        showAlert(error.message, "danger");
    }
}

        loadAnalytics();
    </script>
</body>
</html>
