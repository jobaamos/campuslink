<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CampusLink</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo a {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .auth-card h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .auth-card .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">🔗 CampusLink</a>
            </div>
            <h2>Forgot Password?</h2>
            <p class="subtitle">Enter your email address and we'll send you a reset link</p>

            <div id="alert-container"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your registered email">
            </div>

            <button class="btn btn-primary" onclick="requestReset()">Send Reset Link</button>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        async function requestReset() {
            const email = document.getElementById("email").value.trim();

            if (!email) {
                showAlert("Please enter your email address", "danger");
                return;
            }

            try {
                await apiRequest(`/auth/forgot-password?email=${encodeURIComponent(email)}`, "POST");
                showAlert("Reset link sent! Please check your email inbox and spam/junk folder.", "success");
            } catch (error) {
                showAlert(error.message, "danger");
            }
        }
    </script>
</body>
</html>
